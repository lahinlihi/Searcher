<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 — 입찰공고 통합 검색</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-blue-600">입찰공고 통합 검색</h1>
            <p class="text-sm text-gray-500 mt-1">로그인하여 계속하세요</p>
        </div>
        <div class="bg-white rounded-xl shadow-sm border p-8">
            {% if error %}
            <div class="mb-4 px-3 py-2 bg-red-50 border border-red-200 rounded text-sm text-red-700">
                {{ error }}
            </div>
            {% endif %}
            <form method="POST" action="/login">
                <input type="hidden" name="next" value="{{ next }}">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1" for="username">아이디</label>
                    <input type="text" id="username" name="username" required autofocus
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                           placeholder="아이디 입력">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1" for="password">비밀번호</label>
                    <input type="password" id="password" name="password" required
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                           placeholder="비밀번호 입력">
                </div>
                <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg px-4 py-2 text-sm transition-colors">
                    로그인
                </button>
            </form>
        </div>
    </div>
</body>
</html>
