{% extends "base.html" %}

{% block title %}로그 - 입찰공고 통합 검색 시스템{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <h2 class="text-2xl font-bold text-gray-900">크롤링 로그</h2>
        <button onclick="loadLogs()" class="btn-primary">새로고침</button>
    </div>

    <!-- 로그 목록 -->
    <div id="logs-list" class="space-y-4">
        <!-- 동적으로 채워짐 -->
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/logs.js') }}"></script>
{% endblock %}
