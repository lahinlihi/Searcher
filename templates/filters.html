{% extends "base.html" %}

{% block title %}필터관리 - 입찰공고 통합 검색 시스템{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <h2 class="text-2xl font-bold text-gray-900">필터 관리</h2>
        <button onclick="showCreateFilterModal()" class="btn-primary">+ 새 필터 만들기</button>
    </div>

    <!-- 필터 목록 -->
    <div id="filters-list" class="space-y-4">
        <!-- 동적으로 채워짐 -->
    </div>
</div>

<!-- 필터 생성/수정 모달 (간단한 구현) -->
<div id="filter-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
    <div class="bg-white rounded-lg p-6 max-w-2xl w-full mx-4 max-h-screen overflow-y-auto">
        <h3 class="text-xl font-bold mb-4" id="modal-title">새 필터 만들기</h3>

        <div class="space-y-4">
            <div class="form-group">
                <label class="form-label">필터 이름</label>
                <input type="text" id="modal-filter-name" class="form-input">
            </div>

            <div class="form-group">
                <label class="form-label">포함 키워드 (쉼표로 구분)</label>
                <input type="text" id="modal-include-keywords" class="form-input">
            </div>

            <div class="form-group">
                <label class="form-label">제외 키워드 (쉼표로 구분)</label>
                <input type="text" id="modal-exclude-keywords" class="form-input">
            </div>

            <div class="form-group">
                <label class="flex items-center">
                    <input type="checkbox" id="modal-is-default" class="form-checkbox mr-2">
                    <span class="form-label mb-0">기본 필터로 설정</span>
                </label>
            </div>
        </div>

        <div class="flex gap-2 mt-6">
            <button onclick="saveFilter()" class="btn-primary">저장</button>
            <button onclick="closeFilterModal()" class="btn-secondary">취소</button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/filters.js') }}"></script>
{% endblock %}
