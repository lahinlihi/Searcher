{% extends "base.html" %}

{% block title %}관심공고 - 입찰공고 통합 검색 시스템{% endblock %}

{% block content %}
<div class="space-y-6">
    <!-- 탭 -->
    <div class="border-b border-gray-200">
        <nav class="flex gap-1">
            <button id="tab-bookmarks"
                onclick="switchTab('bookmarks')"
                class="tab-btn tab-active px-5 py-2.5 text-sm font-medium border-b-2 border-blue-600 text-blue-600">
                ★ 관심공고 <span id="bookmark-count" class="ml-1 text-xs bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded-full">-</span>
            </button>
            <button id="tab-dismissed"
                onclick="switchTab('dismissed')"
                class="tab-btn px-5 py-2.5 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700">
                ✕ 관심없음 <span id="dismissed-count" class="ml-1 text-xs bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded-full">-</span>
            </button>
            <button id="tab-memos"
                onclick="switchTab('memos')"
                class="tab-btn px-5 py-2.5 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700">
                ✎ 메모 <span id="memos-count" class="ml-1 text-xs bg-purple-100 text-purple-700 px-1.5 py-0.5 rounded-full">-</span>
            </button>
        </nav>
    </div>

    <!-- 관심공고 목록 -->
    <div id="panel-bookmarks" class="card">
        <div class="card-body">
            <div id="bookmarks-list" class="space-y-3">
                <p class="text-gray-400 text-sm text-center py-8">불러오는 중...</p>
            </div>
        </div>
    </div>

    <!-- 관심없음 목록 -->
    <div id="panel-dismissed" class="card hidden">
        <div class="card-body">
            <p class="text-xs text-gray-500 mb-3">✕ 버튼으로 숨긴 공고 목록입니다. 복원하면 다시 대시보드에 표시됩니다.</p>
            <div id="dismissed-list" class="space-y-3">
                <p class="text-gray-400 text-sm text-center py-8">불러오는 중...</p>
            </div>
        </div>
    </div>

    <!-- 메모 공고 목록 -->
    <div id="panel-memos" class="card hidden">
        <div class="card-body">
            <p class="text-xs text-gray-500 mb-3">✎ 메모가 작성된 공고 목록입니다. 모든 사용자가 공유합니다.</p>
            <div id="memos-list" class="space-y-3">
                <p class="text-gray-400 text-sm text-center py-8">불러오는 중...</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/bookmarks.js') }}"></script>
{% endblock %}
